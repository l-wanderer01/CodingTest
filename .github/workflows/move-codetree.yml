name: Move CodeTree Solutions

on:
  workflow_dispatch:
  push:
    paths:
      - '[0-9][0-9][0-9][0-9][0-9][0-9]/**'
      - 'trail*/**'

permissions:
  contents: write

jobs:
  move-files:
    runs-on: ubuntu-latest
    if: github.event_name != 'push' || github.actor != 'github-actions[bot]'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Move CodeTree solutions
        shell: bash
        run: |
          shopt -s nullglob
          mkdir -p CodeTree

          found=0
          for d in [0-9][0-9][0-9][0-9][0-9][0-9] trail*; do
            if [ -d "$d" ]; then
              echo "Moving directory: $d"
              if [ -e "CodeTree/$d" ]; then
                rsync -a "$d"/ "CodeTree/$d"/
                rm -rf "$d"
              else
                mv "$d" CodeTree/
              fi
              found=1
            fi
          done

          if [ $found -eq 0 ]; then
            echo "No matching directories found to move"
          fi

      - name: Commit & Push changes
        run: |
          if git status --porcelain | grep .; then
            git config --global user.name 'github-actions[bot]'
            git config --global user.email 'github-actions[bot]@users.noreply.github.com'
            git add -A
            git commit -m "chore: Move CodeTree solutions to CodeTree folder"
            git push
          else
            echo "No changes to commit"
          fi
