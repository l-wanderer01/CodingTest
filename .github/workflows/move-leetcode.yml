name: Move LeetCode Solutions

on:
  workflow_dispatch:
  schedule:
    # Daily sweep at 03:10 KST.
    - cron: '10 18 * * *'
  push:
    paths:
      - '[0-9][0-9][0-9][0-9]-*/**'

permissions:
  contents: write

jobs:
  move-files:
    runs-on: ubuntu-latest
    if: github.event_name != 'push' || github.actor != 'github-actions[bot]'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Move LeetCode solutions
        shell: bash
        run: |
          shopt -s nullglob
          mkdir -p LeetCode

          echo "Changed files in this push:"
          git diff --name-only HEAD^ HEAD || true

          found=0
          for d in [0-9][0-9][0-9][0-9]-*; do
            if [ -d "$d" ]; then
              echo "Moving directory: $d"
              if [ -e "LeetCode/$d" ]; then
                rsync -a "$d"/ "LeetCode/$d"/
                rm -rf "$d"
              else
                mv "$d" LeetCode/
              fi
              found=1
            fi
          done

          if [ $found -eq 0 ]; then
            echo "No matching directories found to move"
          fi

      - name: Commit & Push changes
        run: |
          # 변경사항이 있는지 확인
          if git status --porcelain | grep .; then
            git config --global user.name 'github-actions[bot]'
            git config --global user.email 'github-actions[bot]@users.noreply.github.com'
            git add -A
            git commit -m "chore: Move LeetCode solutions to LeetCode folder"
            git push
          else
            echo "No changes to commit"
          fi
